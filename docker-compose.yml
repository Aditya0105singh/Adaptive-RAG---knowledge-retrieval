version: "3.9"

# ─── DocMind — one-command full stack ────────────────────────────────────────
#
#   docker compose up --build
#
#   Then open http://localhost:8501
#
# Services
#   qdrant    — vector database (port 6333)
#   mongo     — chat-history store (port 27017)
#   backend   — FastAPI + LangGraph RAG pipeline (port 8080)
#   frontend  — Streamlit UI (port 8501)
#
# Secrets
#   Copy .env.example → .env and fill in GROQ_API_KEY + TAVILY_API_KEY.
#   Docker Compose automatically loads .env from the same directory.
# ─────────────────────────────────────────────────────────────────────────────

services:

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    command: python main.py
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override local defaults to use Docker service hostnames
      QDRANT_URL: http://qdrant:6333
      MONGO_URI: mongodb://mongo:27017
      CORS_ORIGINS: http://localhost:8501,http://frontend:8501
      API_PORT: "8080"
    depends_on:
      qdrant:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./qdrant_storage:/app/qdrant_storage   # local disk fallback if Qdrant is down
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: .
    command: >
      streamlit run app.py
      --server.port 8501
      --server.headless true
      --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # The Streamlit server calls the backend over the Docker network
      API_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
  mongo_data:
